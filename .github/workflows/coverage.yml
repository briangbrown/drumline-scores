name: Code Coverage

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "*.config.ts"
      - "package.json"
  pull_request:
    paths:
      - "src/**"
      - "*.config.ts"
      - "package.json"

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run test:coverage
