name: Score Poller

on:
  schedule:
    # --- DYNAMIC CRON START ---
    - cron: '0 0 31 2 *'
    # --- DYNAMIC CRON END ---
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      PIPELINE_ISSUE_ASSIGNEE: ${{ secrets.PIPELINE_ISSUE_ASSIGNEE }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_PAT }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Poll for scores
        id: poll
        run: npx tsx src/pipeline/cli/pollScores.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "score-pipeline[bot]"
          git config user.email "score-pipeline[bot]@users.noreply.github.com"
          git add -A public/data/ data/scores/ data/poll-state.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(data): auto-import scores

          Automated by: score-ingestion-pipeline"
          git push

      - name: Self-disable if no more work
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
        run: |
          # Disable the poller only if no pending retreats AND all windows have closed.
          # This prevents disabling before a later retreat window has had time to produce scores.
          SHOULD_DISABLE=$(node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('data/poll-state.json', 'utf-8'));
            const now = Date.now();
            const pending = state.retreats.filter(r => r.status === 'pending');
            const openWindows = state.retreats.filter(r =>
              now < new Date(r.windowCloseUtc).getTime()
            );
            // Only disable if no pending retreats AND no windows are still open
            console.log(pending.length === 0 && openWindows.length === 0 ? 'yes' : 'no');
          ")
          if [ "$SHOULD_DISABLE" = "yes" ]; then
            echo "No pending retreats and all windows closed — disabling poller"
            gh workflow disable score-poller.yml
          else
            echo "Poller stays enabled (pending retreats or open windows remain)"
          fi
