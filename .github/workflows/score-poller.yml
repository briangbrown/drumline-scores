name: Score Poller

on:
  schedule:
    # --- DYNAMIC CRON START ---
    - cron: '0 0 31 2 *'
    # --- DYNAMIC CRON END ---
  workflow_dispatch: {}

concurrency:
  group: score-poller
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      PIPELINE_ISSUE_ASSIGNEE: ${{ secrets.PIPELINE_ISSUE_ASSIGNEE }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_PAT }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Poll for scores
        id: poll
        run: npx tsx src/pipeline/cli/pollScores.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "score-pipeline[bot]"
          git config user.email "score-pipeline[bot]@users.noreply.github.com"
          git add -A public/data/ data/scores/ data/poll-state.json .github/workflows/score-poller.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(data): auto-import scores

          Automated by: score-ingestion-pipeline"
          git push

      - name: Self-disable if no more work
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
        run: |
          # Disable the poller if poll-state shows no pending retreats
          PENDING=$(node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('data/poll-state.json', 'utf-8'));
            const pending = state.retreats.filter(r => r.status === 'pending');
            console.log(pending.length);
          ")
          if [ "$PENDING" = "0" ]; then
            echo "No pending retreats — disabling poller"
            gh workflow disable score-poller.yml
          else
            echo "$PENDING pending retreat(s) — poller stays enabled"
          fi
