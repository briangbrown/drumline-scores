name: Schedule Watcher

on:
  schedule:
    # Thu/Fri/Sat ~2 PM Mountain (MDT=2PM, MST=1PM — off by 1h early season is fine)
    - cron: '0 20 * * 4,5,6'
  workflow_dispatch: {}

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_PAT }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Watch schedules
        run: npx tsx src/pipeline/cli/watchSchedule.ts
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_PAT }}

      - name: Commit and push
        run: |
          git config user.name "score-pipeline[bot]"
          git config user.email "score-pipeline[bot]@users.noreply.github.com"
          git add data/poll-state.json .github/workflows/score-poller.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(data): update poll-state and poller schedule

          Automated by: score-ingestion-pipeline"
          git push
